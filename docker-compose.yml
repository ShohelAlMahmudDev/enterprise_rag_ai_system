version: '3.9'
services:
  backend:
    build: ./backend
    container_name: enterprise-rag-backend
    ports:
      - '8000:8000'
    volumes:
      - ./backend/app:/app/app
      - rag_data:/app/data
    environment:
      APP_ENV: production
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DATABASE_URL: sqlite:///./data/app.db
      DATA_DIR: ./data
      UPLOAD_DIR: ./data/uploads
      VECTOR_INDEX_PATH: ./data/faiss.index
      VECTOR_META_PATH: ./data/faiss_meta.json
  frontend:
    build: ./frontend
    container_name: enterprise-rag-frontend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  rag_data:
